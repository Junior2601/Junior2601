<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" width="680" height="320">
  <defs>
    <style>
      .code { font-family: 'Fira Code', 'Courier New', monospace; }
      .fade-in { animation: fadeIn 0.6s ease both; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="320" rx="12" fill="#0d1117"/>

  <!-- Grid lines -->
  <line x1="0" y1="60" x2="680" y2="60" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="260" x2="680" y2="260" stroke="#21262d" stroke-width="0.5"/>

  <!-- Top bar dots -->
  <circle cx="24" cy="30" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="30" r="6" fill="#febc2e"/>
  <circle cx="64" cy="30" r="6" fill="#28c840"/>
  <text x="340" y="35" text-anchor="middle" class="code" font-size="11" fill="#484f58">profile.md</text>

  <!-- Line numbers -->
  <text x="20" y="90"  class="code" font-size="11" fill="#30363d">1</text>
  <text x="20" y="115" class="code" font-size="11" fill="#30363d">2</text>
  <text x="20" y="140" class="code" font-size="11" fill="#30363d">3</text>
  <text x="20" y="165" class="code" font-size="11" fill="#30363d">4</text>
  <text x="20" y="190" class="code" font-size="11" fill="#30363d">5</text>
  <text x="20" y="215" class="code" font-size="11" fill="#30363d">6</text>
  <text x="20" y="240" class="code" font-size="11" fill="#30363d">7</text>

  <!-- Line 1 -->
  <text x="50" y="90" class="code fade-in" font-size="13" style="animation-delay:0.1s">
    <tspan fill="#58a6ff">#</tspan>
    <tspan fill="#8b949e"> Hi there 👋 — I'm </tspan>
    <tspan fill="#ffa657" font-weight="600">Paul</tspan>
  </text>

  <!-- Line 2 -->
  <text x="50" y="115" class="code fade-in" font-size="12" style="animation-delay:0.4s">
    <tspan fill="#f78166">📊</tspan>
    <tspan fill="#79c0ff"> Data Analyst</tspan>
    <tspan fill="#8b949e"> · </tspan>
    <tspan fill="#56d364">🤖</tspan>
    <tspan fill="#79c0ff"> Data Scientist</tspan>
    <tspan fill="#8b949e"> · </tspan>
    <tspan fill="#ffa657">⚙️</tspan>
    <tspan fill="#79c0ff"> Data Engineer</tspan>
  </text>

  <!-- Line 3 -->
  <text x="50" y="140" class="code fade-in" font-size="12" style="animation-delay:0.7s">
    <tspan fill="#d2a8ff">import</tspan>
    <tspan fill="#e6edf3"> { </tspan>
    <tspan fill="#79c0ff">pandas</tspan>
    <tspan fill="#e6edf3">, </tspan>
    <tspan fill="#79c0ff">sklearn</tspan>
    <tspan fill="#e6edf3">, </tspan>
    <tspan fill="#79c0ff">tensorflow</tspan>
    <tspan fill="#e6edf3"> } </tspan>
    <tspan fill="#d2a8ff">from </tspan>
    <tspan fill="#a5d6ff">'python'</tspan>
  </text>

  <!-- Line 4 -->
  <text x="50" y="165" class="code fade-in" font-size="12" style="animation-delay:1s">
    <tspan fill="#d2a8ff">const</tspan>
    <tspan fill="#e6edf3"> stack </tspan>
    <tspan fill="#ff7b72">=</tspan>
    <tspan fill="#e6edf3"> [ </tspan>
    <tspan fill="#a5d6ff">'React'</tspan>
    <tspan fill="#e6edf3">, </tspan>
    <tspan fill="#a5d6ff">'Node.js'</tspan>
    <tspan fill="#e6edf3">, </tspan>
    <tspan fill="#a5d6ff">'Express'</tspan>
    <tspan fill="#e6edf3">, </tspan>
    <tspan fill="#a5d6ff">'PostgreSQL'</tspan>
    <tspan fill="#e6edf3"> ]</tspan>
  </text>

  <!-- Line 5 -->
  <text x="50" y="190" class="code fade-in" font-size="12" style="animation-delay:1.3s">
    <tspan fill="#d2a8ff">const</tspan>
    <tspan fill="#e6edf3"> style </tspan>
    <tspan fill="#ff7b72">=</tspan>
    <tspan fill="#a5d6ff"> 'TailwindCSS'</tspan>
    <tspan fill="#8b949e">  </tspan>
    <tspan fill="#ff7b72">// </tspan>
    <tspan fill="#8b949e">fast, clean, utility-first</tspan>
  </text>

  <!-- Line 6 -->
  <text x="50" y="215" class="code fade-in" font-size="12" style="animation-delay:1.6s">
    <tspan fill="#d2a8ff">let</tspan>
    <tspan fill="#e6edf3"> focus </tspan>
    <tspan fill="#ff7b72">=</tspan>
    <tspan fill="#a5d6ff"> 'ML · Big Data · Fullstack Dev'</tspan>
  </text>

  <!-- Line 7 -->
  <text x="50" y="240" class="code fade-in" font-size="12" style="animation-delay:1.9s">
    <tspan fill="#ff7b72">// </tspan>
    <tspan fill="#8b949e">always learning...</tspan></br>
    <tspan fill="#8b949e">Disponible pourl'emploi...</tspan>
    <tspan class="cursor" fill="#58a6ff"> █</tspan>
  </text>

  <!-- Badge pills -->
  <g style="animation: slideIn 0.5s ease 2.2s both; opacity:0; animation-fill-mode:both">
    <rect x="50" y="272" width="62" height="22" rx="11" fill="#21262d" stroke="#3b5068" stroke-width="0.5"/>
    <text x="81" y="287" text-anchor="middle" class="code" font-size="10" fill="#79c0ff">🐍 Python</text>
  </g>
  <g style="animation: slideIn 0.5s ease 2.4s both; opacity:0; animation-fill-mode:both">
    <rect x="122" y="272" width="54" height="22" rx="11" fill="#21262d" stroke="#3b5068" stroke-width="0.5"/>
    <text x="149" y="287" text-anchor="middle" class="code" font-size="10" fill="#61dafb">⚛ React</text>
  </g>
  <g style="animation: slideIn 0.5s ease 2.6s both; opacity:0; animation-fill-mode:both">
    <rect x="186" y="272" width="64" height="22" rx="11" fill="#21262d" stroke="#3b5068" stroke-width="0.5"/>
    <text x="218" y="287" text-anchor="middle" class="code" font-size="10" fill="#68a063">📦 Node.js</text>
  </g>
  <g style="animation: slideIn 0.5s ease 2.8s both; opacity:0; animation-fill-mode:both">
    <rect x="260" y="272" width="76" height="22" rx="11" fill="#21262d" stroke="#3b5068" stroke-width="0.5"/>
    <text x="298" y="287" text-anchor="middle" class="code" font-size="10" fill="#336791">🐘 PostgreSQL</text>
  </g>
  <g style="animation: slideIn 0.5s ease 3s both; opacity:0; animation-fill-mode:both">
    <rect x="346" y="272" width="68" height="22" rx="11" fill="#21262d" stroke="#3b5068" stroke-width="0.5"/>
    <text x="380" y="287" text-anchor="middle" class="code" font-size="10" fill="#f97316">🍃 Tailwind</text>
  </g>
  <g style="animation: slideIn 0.5s ease 3.2s both; opacity:0; animation-fill-mode:both">
    <rect x="424" y="272" width="58" height="22" rx="11" fill="#21262d" stroke="#3b5068" stroke-width="0.5"/>
    <text x="453" y="287" text-anchor="middle" class="code" font-size="10" fill="#f7df1e">✨ ML/AI</text>
  </g>
  <g style="animation: slideIn 0.5s ease 3.4s both; opacity:0; animation-fill-mode:both">
    <rect x="492" y="272" width="66" height="22" rx="11" fill="#21262d" stroke="#3b5068" stroke-width="0.5"/>
    <text x="525" y="287" text-anchor="middle" class="code" font-size="10" fill="#56d364">📈 Big Data</text>
  </g>
</svg>
